name: deploy

# cc-staging (SIM-403, RFC v2-010 S1): the dev -> staging -> production lane.
# v2 (2026-07-21, verified against the LIVE Railway topology in the cc-staging
# local session) - the flow is unchanged, the mechanics are now real:
#
# Build the versioned image ONCE on a `v*` tag, deploy it to the STAGING Railway
# environment, then promote the SAME image to PRODUCTION via a gated manual
# step. "Same image" is enforced by DIGEST: each Railway environment's `app`
# service is pinned to a channel alias tag (`staging-current` /
# `production-current`), and this workflow moves those aliases with
# `docker buildx imagetools create` - a REGISTRY-SIDE retag of the already-built
# image, never a rebuild. The artifact approved on staging is byte-for-byte the
# artifact that goes live.
#
# VERIFIED TOPOLOGY (jobhunt-private Railway project):
#   service `app` x environments `staging` | `production`.
#   Staging serves fictional data only (APP_MODE=demo, guardian G9) behind auth,
#   serverless/scale-to-zero, healthcheck /healthz.
#
# GATES:
#   - vars.DEPLOY_ENABLED == 'true'    -> the whole pipeline is a no-op until the
#     owner flips this repo variable on. Unset/false = nothing deploys.
#   - per-env Railway PROJECT tokens (least privilege, environment-scoped):
#     secrets.RAILWAY_STAGING_TOKEN / secrets.RAILWAY_PRODUCTION_TOKEN. The
#     Railway steps skip cleanly if the relevant token is unset (bootstrap), but
#     once a token IS set, a failed redeploy FAILS the run - no silent no-ops.
#   - environment: production          -> the GitHub `production` Environment's
#     required-reviewer rule (Simon) IS the go-live gate. The guardian
#     data-isolation review + the QA scorecard run BEFORE that approval, per
#     company-os/docs/sop-release-promotion.md.
#
# RAILWAY TARGETING IS CONFIG, NOT HARDCODED:
#   - vars.RAILWAY_SERVICE           (set: 'app')
#   - vars.RAILWAY_STAGING_ENV       (default 'staging')
#   - vars.RAILWAY_PRODUCTION_ENV    (default 'production')
#
# BUILD CONTEXT NOTE: ssc-ui is vendored into ./ssc-ui in this repo (prebuilt dist
# + minimal package.json), so `docker build` needs only this repo as its context.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      promote_tag:
        description: "Existing vX.Y.Z tag to promote from staging to PRODUCTION (same image digest, no rebuild)"
        required: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ---- 1) build ONCE + deploy to STAGING (automatic on a v* tag) ------------
  build-and-stage:
    if: ${{ github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the versioned image ONCE. No `latest` tag on purpose: promotion
      # moves the channel aliases below, never a floating latest.
      - name: Build and push image (once)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}

      # Registry-side retag (same digest, no rebuild): point the staging channel
      # alias at this version. Railway's staging `app` service is pinned to
      # `:staging-current`, so the redeploy below pulls exactly this image.
      - name: Point staging-current at ${{ github.ref_name }}
        run: docker buildx imagetools create -t "$IMAGE:staging-current" "$IMAGE:${{ github.ref_name }}"

      - name: Deploy to STAGING (railway redeploy)
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: |
          echo "Deploying $IMAGE:${{ github.ref_name }} (as staging-current) to Railway service '${{ vars.RAILWAY_SERVICE || 'app' }}' env '${{ vars.RAILWAY_STAGING_ENV || 'staging' }}'"
          npm i -g @railway/cli
          railway redeploy --yes \
            --service "${{ vars.RAILWAY_SERVICE || 'app' }}" \
            --environment "${{ vars.RAILWAY_STAGING_ENV || 'staging' }}"

  # ---- 2) promote the SAME image digest to PRODUCTION (gated: go-live GO) ---
  # Triggered manually AFTER the guardian review is GREEN and the QA scorecard
  # passes on staging. The `production` Environment's required reviewer (Simon)
  # is the human GO. No rebuild: the production channel alias is retagged to the
  # approved version's digest, then Railway production re-pulls it.
  promote-production:
    if: ${{ github.event_name == 'workflow_dispatch' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Point production-current at ${{ inputs.promote_tag }} (same digest, no rebuild)
        run: docker buildx imagetools create -t "$IMAGE:production-current" "$IMAGE:${{ inputs.promote_tag }}"

      - name: Promote to PRODUCTION (railway redeploy)
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: |
          echo "Promoting $IMAGE:${{ inputs.promote_tag }} (as production-current) to Railway service '${{ vars.RAILWAY_SERVICE || 'app' }}' env '${{ vars.RAILWAY_PRODUCTION_ENV || 'production' }}'"
          npm i -g @railway/cli
          railway redeploy --yes \
            --service "${{ vars.RAILWAY_SERVICE || 'app' }}" \
            --environment "${{ vars.RAILWAY_PRODUCTION_ENV || 'production' }}"
