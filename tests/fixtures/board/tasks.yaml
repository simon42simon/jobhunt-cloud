    detail: >-
      Owner request (2026-07-02): "when I submitted, I want CTO to comment on it
      after checking the content and answer with the assessment and the plan to
      address it including the subtask."


      CTO assessment: This is the missing feedback half of the
      capture-and-delegate chatbot (docs/chatbot-scoping.md). Two pieces: a
      comments field on tasks, and an assess-only routine that fires on
      submission.


      Plan / subtasks:

      1. Data model: add comments: [{ author, ts, body }] to task records in
      docs/tasks.yaml; extend POST/PATCH /api/tasks (applyTaskFields) with an
      append-comment path; validate shape; tests.

      2. New "assess-ticket" routine in ROUTINES (scope: "ticket", like
      work-ticket): spawns the headless CTO to READ the ticket + relevant
      context and write back an assessment comment (verdict, plan, subtasks,
      suggested owner/priority) via PATCH /api/tasks/:id - comment-only, it does
      NOT execute the work (that stays work-ticket, opt-in).

      3. Auto-fire assess-ticket from ChatCapture after "Queue it" (visible in
      the run panel, stoppable, degrades gracefully at the concurrency cap -
      ticket is queued either way).

      4. Disclose in DATA_CONTRACT.md / governance.md alongside work-ticket
      (same ADR-005 sandbox; free-typed text driving a read+comment agent).


      Acceptance: filing a chatbot ticket produces, within one run, a structured
      CTO assessment comment on that ticket, visible on the Tasks board and in
      the chat panel queue.
