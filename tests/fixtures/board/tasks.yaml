    title: >-
      [feature] Intake ledger: make the request → CTO assessment →
      tasks/projects flow visible
    detail: >-
      Owner request (2026-07-03): "I still cannot see how the prompt is
      received, how CTO break down, how task and projects are generated, etc.
      This whole flow should be recorded. IDK where - tasks? projects? prompt
      table?"


      --- CTO assessment ---

      Confirmed gap, and the right instinct: a 'prompt table' is the missing TOP
      of the chain. Today the flow is only PARTIALLY recorded, in scattered
      places:

      - Chatbot-submitted prompts -> one Task (label 'chatbot') + the CTO
      verdict as a task COMMENT (assess-ticket routine), shown in ChatCapture
      'My reports'. Thin: it shows the ticket, not the request-to-outputs
      lineage, and one request can spawn many tasks / a project that a single
      task cannot represent.

      - Prompts typed straight to the CTO in the terminal session (like THIS
      one) are NOT captured as any first-class record at all - they only become
      visible if the CTO manually files a ticket. The raw prompt, the breakdown
      reasoning, and which tasks/projects it spawned are smeared across the task
      detail text, comments, the activity log, and briefs. That is exactly why
      it 'cannot be seen'.


      The fix is a first-class Request/Intake record: verbatim prompt + source +
      timestamp + CTO assessment (verdict/plan) + spawned:{tasks:[ids],
      projects:[ids]}. It is the origin node the current model lacks (a task is
      an OUTPUT, not the REQUEST). Rendering it as a chain (Prompt -> Assessment
      -> spawned Tasks/Projects with live status -> delegation) makes the whole
      orchestration loop legible.


      --- Plan / subtasks ---

      1. software-architect: new app-managed store docs/requests.yaml + GET/POST
      /api/requests (verbatim text field, NOT id-sanitized), atomic write via
      writeFileAtomic; a request carries spawned task/project ids; POST
      /api/tasks optionally accepts requestId to auto-link. Tests +
      DATA_CONTRACT disclosure.

      2. frontend-engineer: an 'Intake' (Requests) view - each request row
      expands to show verbatim prompt, CTO assessment, and the live status of
      every spawned task/project; chatbot 'My reports' becomes a lens over the
      same store.

      3. Protocol (people-enablement + this memory): extend the standing 'every
      ask -> filed ticket' rule to 'every ask -> filed INTAKE record first, then
      link the tasks/projects it spawns' so direct-session prompts stop being
      invisible.

      4. Optional: a SubagentStop/session hook auto-appends delegation edges so
      the chain fills without manual linking.


      --- Open decision (routed to owner) ---

      WHERE it lives + how much to build now: (A) dedicated Requests/Intake
      ledger [CTO recommendation], (B) fold into tasks as parent/child, (C)
      promote to projects. Awaiting owner steer before build.
