    items:
      - { text: "Image attach + preview + lightbox (ADR-014): paste/drop an allowlisted image (png/jpeg/gif/webp) -> in-memory pending thumbnail -> fail-soft upload after the task POST -> guarded inline lightbox viewer (never a download); POST /api/tasks/:id/attachments with 8 ordered guards + independent magic-byte sniff, content-addressed docs/attachments/<taskId>/<sha256>.<ext>, guarded reader - the app's FIRST binary write-path", done: true }
      - { text: "Security (audit T1): app.listen binds config.serverHost || 127.0.0.1, so the unauthenticated write API is loopback-only by default and LAN is an explicit owner opt-in; DATA_CONTRACT.md discloses the bind posture (audit O-2)", done: true }
      - { text: "Chatbot capture -> linked intake record (D1 / ADR-009): ChatCapture Queue-it also writes POST /api/requests (source chatbot, verbatim ask) linked to the spawned ticket, best-effort/fail-soft, completing the origin chain for in-app captures", done: true }
      - { text: "Completed date across the 3 most-recent surfaces (ADR-013): a server-managed, unforgeable completed field on the task board; the Job Tracker and Projects view derive recency with no new stored field", done: true }
      - { text: "Advanced multi-condition Job Tracker filter: JobFilterBar over a pure jobFilter.ts (AND/OR conditions over real Job fields with type-appropriate operators; completed is derived)", done: true }
      - { text: "My-reports you/QA attribution + QA function stand-up: My reports unions owner chatbot reports (You) and qa-tester bug tickets (QA) via a pure reportSource() selector", done: true }
      - { text: "Dev/infra: activity-log honesty (dangling run closed, lint category fix, lint:activity-log wired into npm run check) + toolchain upgrade vitest ^2 -> ^4.1.9 and vite ^6.4.3 (npm audit clean)", done: true }
