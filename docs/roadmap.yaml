  - id: phase-discovery-sources
    title: Discovery Sources console + triage inbox, telemetry & audit HIGHs (v0.18.0 wave)
    status: shipped
    version: 0.18.0
    shipped: 2026-07-04
    summary: >-
      The Discovery page becomes a managed-source console + rebuilt triage
      inbox: each employer or job board is a managed source in a native
      app-managed YAML registry (ADR-016, not the xlsx) with crawl
      instructions, cadence, DERIVED health status, per-source Run now and a
      capped run history; a Sources <-> Finds toggle flips to a three-pane
      keyboard-first triage inbox with saved views, undo-not-confirm,
      bulk-select, and clickable provenance. Shipped alongside usage-journey
      telemetry v1 (ADR-017), age-based needs-attention buckets for
      deadline-less jobs (audit F1), the SSE consolidation that retires the
      client polls (audit F1-F3), and the finalize-ready queue (audit #1
      lever). Registry unification (t-1783183576537, QA's J10 release
      blocker) closed at the wire: the xlsx global sweep is retired for a
      run-all-due fan-out that stamps per-source lastRunAt honestly. The
      remaining v2 items are deferred and tracked, not dropped: a real
      background scheduler, Maybe snooze-until, and the decide 'clear' verb
      (t-1783178044080).
    items:
      - { text: "Discovery Sources console (ADR-016): docs/discovery-sources.yaml native registry (atomic safe path, NOT the xlsx) + GET/POST/PATCH/DELETE /api/discovery/sources; status/due/nextRunAt/jobCount/newSinceVisit/pursuedPct DERIVED never stored (precedence paused > running > failed > never-run > stale > due > healthy); SourceCard grid + status pill + sparkline + lead yield, SourceDetailDrawer (5 tabs), SourceFormDrawer", done: true }
      - { text: "Per-source Run now + run history: POST /api/discovery/sources/:id/run launches discover-jobs scoped to one source; optimistic running record flipped by the runner's close path to terminal outcome + durationMs + leadsFound/leadsNew; one run per source (409), cap degrades soft (429), history capped at 20", done: true }
      - { text: "Rebuilt triage inbox (Finds): three-pane master-detail with saved views (New/Maybe/Pursued/All/Hidden), keyboard-first J/K + S/M/P auto-advance triage, undo-not-confirm (~6s toast), bulk-select with a pinned action bar, clickable source provenance; finds JOIN by stamped sourceId else name/aliases, with an honest unassigned bucket", done: true }
      - { text: "Usage-journey telemetry v1 (ADR-017): POST /api/telemetry + summary endpoint over a local-only gitignored docs/usage-telemetry.jsonl (events-never-content by construction, server-stamped unforgeable ts); fail-soft J-tagged client instrumentation across 12 components (J1-J11); Usage hub panel + the PM-bound usage-insights routine (read-and-recommend only, at most 3 tickets)", done: true }
      - { text: "Needs-attention age buckets (audit F1): stale-draft falls back to file age (>7d) for deadline-less drafts + a new stale-leads bucket for deadline-less lead/queued jobs; one-bucket-per-job precedence preserved (overdue > due-soon > stale-draft > stale-lead), chips read 'status Nd - no deadline'", done: true }
      - { text: "SSE consolidation (audit F1-F3): typed server broadcasts (jobs-changed / run-finished / source-run-finished / tasks-changed) + ONE shared useEventStream client; bell/chat/batch/discovery polls retired to event-driven with conservative fallbacks; DiscoveryView is the single finds owner", done: true }
      - { text: "Finalize queue (audit #1 lever): DERIVED gapsAnswered (gaps-note mtime strictly newer than the generated CV) + finalizeReady (drafted && hasCV && gapsAnswered), never stored; batch endpoint readiness guard (never auto-submits); ready-to-finalize chips + TopBar 'Finalize ready (N)' batch", done: true }
      - { text: "Registry unification (t-1783183576537, QA J10 release blocker, PR #6): the xlsx-reading global sweep retired for POST /api/discovery/run-all-due - a fan-out of per-source runs over every DUE active source (concurrency-capped, stamp-at-launch, trigger 'all-due' provenance, prune moved over); write race fixed (sources reload inside readDiscovery); TopBar 'Discover due'; xlsx Config keeps Job Types + Filters only", done: true }
      - { text: "v2 deferred - real background scheduler: v1 cadence is declarative + a DERIVED due flag; the model is shaped so a scheduler reads the same fields", done: false }
      - { text: "v2 deferred - Maybe snooze-until: 'Maybe' as a real snoozed state with a resurface date, not just a saved view", done: false }
      - { text: "decide 'clear' verb (t-1783178044080, shipped v0.23.0): persist undo of a New -> Skip/Maybe decision by writing an EMPTY Decision cell so the undo survives a reload", done: true }

