product: Jobhunt Command Center
# version/updated below are an AUTHORED FALLBACK ONLY. The Roadmap board DERIVES
# the header product version + date from the latest released changelog entry, and
# each phase's `status` from its linked portfolio milestones (roadmap_phase) + the
# changelog releases (ADR-012, src/lib/roadmapDerive.ts) - so the view cannot
# drift. Do NOT hand-maintain a phase `status` expecting the board to honor it;
# the derived value wins. The stored `status` is used only as the fallback for a
# phase with NO linked milestones and NO released version (e.g. phase-1, backlog).
