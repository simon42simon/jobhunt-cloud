# Project portfolio (hand-edited). The Execution pillar's source of truth.
# Rendered in the app: Product hub -> Projects. Read-only endpoint: GET /api/portfolio.
#
# projects[] group work by department (a group id in agents.yaml), with an owner
# (an agent/role id) and an accountable manager (a role id). milestones[] belong to
# a project and may optionally pin to a roadmap.yaml phase. References point UP
# (task -> milestone -> project); referential integrity is a read/test invariant,
# not enforced on write, so a yet-to-exist ref never blocks a save.
