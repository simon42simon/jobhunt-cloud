  - id: prj-operational-system
    name: Operational Management System + Portfolio / Roadmap Currency
    department: engineering
    owner: cto
    accountable: cto
    goal: >-
      Stand up the operational-management system end to end and keep the app's own
      record honest. The intake ledger + per-project PM/RACI shipped (v0.15.0);
      still ahead are roadmap-status-derived-from-portfolio (part 2), a full
      stakeholder / risk register per project, prompt auto-capture into the ledger,
      and portfolio / roadmap currency (this charting pass). Currency risk: the
      Projects and Roadmap views drift from reality unless status is DERIVED, not
      hand-maintained - the open milestones below close that gap.
    status: done
    target: v0.16.0
    created: '2026-07-03'
    # --- operational-management (ADR-010): PM + RACI. responsible = DERIVED from task owners (not stored); accountable = the top-level field (not duplicated) ---
    origin_request: r-1783111225868
    sponsor: owner
    project_manager: cto
    raci:
      consulted: []
      informed: [owner]
    # --- stakeholder register + risk list (ADR-011): OPTIONAL + additive; added
    # the first time a project has a genuine open risk (deferred in ADR-010). No
    # stakeholders[] here - this is an internal OS project, so sponsor + RACI ARE
    # the register (design section E); a stakeholder row would be ceremony. The one
    # genuine open risk is this project's own goal: currency drift. ---
    risks:
      - id: risk-currency-drift
        description: >-
          The Projects and Roadmap views drift from reality unless status is
          DERIVED from the underlying tasks / milestones / releases rather than
          hand-maintained - a shipped wave or an in-progress project can sit
          mislabeled, and the app's own record of itself stops being trustworthy.
        likelihood: medium
        impact: high
        status: mitigating
        mitigation: >-
          Derive-not-store (roadmap status derived from linked projects /
          milestones, the same discipline as raci.responsible derived from task
          owners), prompt auto-capture into the intake ledger, and status
          reconciliation at every release (governance section 3) progressively
          close it; this v0.16.0 wave lands the derive + auto-capture pieces.
        owner: cto

